spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/exports_db}
spring.datasource.username=${DATABASE_USER:user}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver
server.port=${PORT:8080}

# HikariCP settings optimized for low-latency streaming database access
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=ExportEngineHikariCP

# Enable HTTP response compression
# We will handle compression manually for export files to set specific headers and match requirements
server.compression.enabled=false
